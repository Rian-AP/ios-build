name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-ios:
    name: Build Unsigned IPA
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Expo Prebuild (generate native iOS project)
        run: npx expo prebuild --platform ios --clean --non-interactive

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: derived-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock', 'package-lock.json') }}
          restore-keys: |
            derived-${{ runner.os }}-

      - name: Build unsigned archive
        run: |
          xcodebuild archive \
            -workspace ios/mobile.xcworkspace \
            -scheme mobile \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/mobile.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | tee build/xcodebuild.log | grep -E "error:|ARCHIVE|PhaseScript|Invalid|Cannot|SyntaxError|Metro|bundle" || true
          
          if [ ! -d "build/mobile.xcarchive" ]; then
            echo "=== FULL BUILD LOG (last 100 lines) ==="
            tail -100 build/xcodebuild.log
            exit 1
          fi

      - name: Package unsigned IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -r build/mobile.xcarchive/Products/Applications/mobile.app build/ipa/Payload/
          cd build/ipa
          zip -r ../mobile-unsigned.ipa Payload
          cd ../..

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-unsigned-ipa
          path: build/mobile-unsigned.ipa
          retention-days: 7
