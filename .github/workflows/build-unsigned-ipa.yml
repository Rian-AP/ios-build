name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-ios:
    name: Build Unsigned IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.3
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Expo Prebuild (generate native iOS project)
        run: npx expo prebuild --platform ios --clean --non-interactive

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build unsigned archive
        run: |
          xcodebuild archive \
            -workspace ios/mobile.xcworkspace \
            -scheme mobile \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/mobile.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            | xcpretty

      - name: Package unsigned IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -r build/mobile.xcarchive/Products/Applications/mobile.app build/ipa/Payload/
          cd build/ipa
          zip -r ../mobile-unsigned.ipa Payload
          cd ../..

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-unsigned-ipa
          path: build/mobile-unsigned.ipa
          retention-days: 7
